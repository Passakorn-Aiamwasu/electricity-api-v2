name: Production CI/CD Pipeline

on:
  push:
    branches: [ "main" ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    - name: Setup Node.js
      uses: actions/setup-node@v3
      with:
        node-version: 18
    - name: Install dependencies
      run: npm install
    - name: Run Unit Tests # <--- NEW STEP
      run: npm test

  build-and-push:
    needs: test # <--- This job ONLY runs if the "test" job passes!
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
  
      # 1. Login Docker Hub
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
  
      # 2. Build image
      - name: Build Docker Image
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/electricity-api:prod-${{ github.sha }} .
  
      # 3. Push image
      - name: Push Docker Image
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/electricity-api:prod-${{ github.sha }}